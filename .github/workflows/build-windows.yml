name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install napari[all] opencv-python matplotlib scipy pyinstaller imageio imageio-ffmpeg av PyQt5
          pip uninstall PyQt6 PyQt6-Qt6 PyQt6-sip -y || true

      - name: Build executable
        run: |
          pyinstaller --onedir --windowed --name "ParticleAnalyzer" --exclude-module PyQt6 --hidden-import imageio --hidden-import imageio_ffmpeg --hidden-import av --hidden-import cv2 --hidden-import scipy --hidden-import napari --collect-all imageio --collect-all imageio_ffmpeg --collect-all napari napari_particle_selector.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParticleAnalyzer-Windows
          path: dist/ParticleAnalyzer/
