name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install napari[all] opencv-python matplotlib scipy pyinstaller imageio

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name "ParticleAnalyzer" napari_particle_selector.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParticleAnalyzer-Windows
          path: dist/ParticleAnalyzer.exe
